<div>
    <input type="checkbox"
           id="diagram_status_check"
           (change)="filterChart()"
           [(ngModel)]="statusCheck"
           name="status_check" />
    Статус
    <select
            id="diagram_status_select"
            (change)="filterChart()"
            [(ngModel)]="statusSelect"
            name="status_select"
            value="bar">
        <option
                *ngFor="let value of statusSelectOptions"
                [attr.label]="value.name"
                [ngValue]="value"
                [textContent]="value.name">
        </option>
    </select>
</div>

<div>
    <input type="checkbox"
           id="diagram_date_check"
           (change)="filterChart()"
           [(ngModel)]="dateCheck"
           name="date_check" />
    Дата исполнения
    <op-date-picker (onChange)="dateBegin = parser($event); filterChart()">
        <input [ngModel]="formatter(dateBegin)"
               (ngModelChange)="dateBegin = parser($event); filterChart()"
               id="diagram_date_begin"
               name="date_begin_dp"
               class="advanced-filters--date-field"
               size="10"
               type="text"/>
    </op-date-picker>
    <op-date-picker (onChange)="dateEnd = parser($event); filterChart()">
        <input [ngModel]="formatter(dateEnd)"
               (ngModelChange)="dateEnd = parser($event); filterChart()"
               id="diagram_date_end"
               name="date_end_dp"
               class="advanced-filters--date-field"
               size="10"
               type="text"/>
    </op-date-picker>
</div>
<div>
    <input type="checkbox"
           id="diagram_kpi_check"
           (change)="filterChart()"
           [(ngModel)]="kpiCheck"
           name="kpi_check" />
    KPI
    <select
            id="diagram_kpi_select"
            (change)="filterChart()"
            [(ngModel)]="kpiOperation"
            name="kpi_select"
            value="bar">
        <option value=">=">Больше или равно</option>
        <option selected value="=">Равно</option>
        <option value="<=">Меньше или равно</option>
    </select>
    <input type="text"
           size="10"
           id="diagram_kpi_value"
           (change)="filterChart()"
           [(ngModel)]="kpiValue"
           name="kpi_value" />
</div>
<div style="display: block;">
    <canvas baseChart
            [datasets]="barChartData"
            [labels]="barChartLabels"
            [options]="barChartOptions"
            [plugins]="barChartPlugins"
            [legend]="barChartLegend"
            [chartType]="barChartType">
    </canvas>
</div>
